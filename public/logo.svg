<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="60%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle decorative circles -->
  <circle cx="60" cy="60" r="80" fill="rgba(255,255,255,0.08)"/>
  <circle cx="470" cy="470" r="140" fill="rgba(255,255,255,0.06)"/>

  <!-- Leaf accent top right -->
  <g transform="translate(370,80) rotate(25)">
    <path d="M0,0 Q30,-40 60,-10 Q70,30 40,55 Q10,40 0,0 Z"
          fill="rgba(255,255,255,0.85)"/>
    <path d="M10,10 Q20,-10 40,5" stroke="rgba(5,150,105,0.5)" stroke-width="2" fill="none"/>
  </g>

  <!-- ABC text -->
  <text x="256" y="310"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="200"
        font-weight="700"
        text-anchor="middle"
        fill="white"
        filter="url(#shadow)"
        letter-spacing="-6">ABC</text>

  <!-- Tagline -->
  <text x="256" y="400"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="32"
        font-weight="300"
        text-anchor="middle"
        fill="rgba(255,255,255,0.9)"
        letter-spacing="8">WELLNESS</text>
</svg>
